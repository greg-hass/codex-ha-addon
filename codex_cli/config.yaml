name: "Codex CLI"
version: "0.2.1"
slug: "codex_cli"
description: "Run OpenAI Codex inside Home Assistant and sign in with device-code OAuth"
url: "https://github.com/openai/codex"
arch:
  - aarch64
  - amd64
build_from:
  aarch64: "ghcr.io/home-assistant/aarch64-base-python:3.11-alpine3.19"
  amd64: "ghcr.io/home-assistant/amd64-base-python:3.11-alpine3.19"
init: false
startup: application
boot: auto
options:
  workspace_dir: "/homeassistant"
  model: ""
  sandbox_mode: "workspace-write"
  approval_policy: "never"
  enable_web_search: false
  log_level: "info"
schema:
  workspace_dir: str
  model: str
  sandbox_mode: list(read-only|workspace-write|danger-full-access)
  approval_policy: list(untrusted|on-request|never)
  enable_web_search: bool
  log_level: list(debug|info|warning|error)
ports:
  8000/tcp: 8000
map:
  - type: homeassistant_config
    read_only: false
    path: /homeassistant
  - type: addons
    read_only: false
  - type: backup
    read_only: false
  - type: share
    read_only: false
  - type: media
    read_only: false
  - type: ssl
    read_only: false
  - type: all_addon_configs
    read_only: false
panel_icon: "mdi:console-network-outline"
panel_title: "Codex CLI"
panel_admin: false
ingress: true
ingress_port: 8000
ingress_stream: true
